services:
  # Production: compiled binary with embedded frontend
  sharkord:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: sharkord
    restart: unless-stopped
    stop_grace_period: 2s
    profiles: ["prod"]
    ports:
      - "40000:40000/tcp"
      - "40000:40000/udp"
    environment:
      SHARKORD_PORT: "4991"
    volumes:
      - ./data:/home/sharkord/.config/sharkord

  # HTTPS reverse proxy
  caddy:
    image: caddy:alpine
    container_name: sharkord-caddy
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      - sharkord
    ports:
      - "8443:8443/tcp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # Dev: builds from source, runs Vite + Bun server
  sharkord-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sharkord-dev
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "4991:4991/tcp"
      - "5173:5173/tcp"
      - "40000:40000/tcp"
      - "40000:40000/udp"
    environment:
      SHARKORD_PORT: "4991"
    volumes:
      - ./data:/home/bun/.config/sharkord

volumes:
  caddy_data:
  caddy_config:
