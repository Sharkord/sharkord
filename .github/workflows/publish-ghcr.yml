name: Publish Docker Images to GHCR

# Automatically builds and publishes Docker images to GitHub Container Registry:
# - Staging images when code is pushed to development branch
# - Release images when a new tag is pushed or release is created
#
# Image tags:
#   Staging (development branch):
#     - ghcr.io/<owner>/<repo>:staging (always points to latest development)
#     - ghcr.io/<owner>/<repo>:staging-<sha> (specific commit)
#
#   Release (tags/releases):
#     - ghcr.io/<owner>/<repo>:latest (always points to latest release)
#     - ghcr.io/<owner>/<repo>:v1.2.3 (specific version)
#     - ghcr.io/<owner>/<repo>:1.2.3 (version without 'v' prefix)
#     - ghcr.io/<owner>/<repo>:1.2 (major.minor)
#     - ghcr.io/<owner>/<repo>:1 (major only)

on:
  workflow_dispatch:
  push:
    branches:
      - development
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
      - '.vscode/**'
      - '.editorconfig'
      - '.prettierrc*'
      - '.eslintrc*'
      - '.gitignore'
    tags:
      - 'v*.*.*'
  release:
    types: [published]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-publish:
    needs: [ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project artifacts
        uses: ./.github/actions/build-sharkord

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/development' }}
            type=sha,prefix=staging-,enable=${{ github.ref == 'refs/heads/development' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
